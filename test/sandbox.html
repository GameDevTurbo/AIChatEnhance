<script>
/* ════════════════════════════════════════════
   MOCK VS CODE API
   ════════════════════════════════════════════ */
var _vscMessages = [];
var _messageHandlers = [];

window.acquireVsCodeApi = function() {
  return {
    postMessage: function(msg) {
      _vscMessages.push(msg);
      log('info', '→ postMessage: ' + msg.type);
      // 自动响应部分 message 类型（模拟后端）
      handleMockBackend(msg);
    },
    getState: function() { return window._sandboxState || null; },
    setState: function(s) { window._sandboxState = s; }
  };
};

function handleMockBackend(msg) {
  setTimeout(function() {
    switch (msg.type) {
      case 'requestModels':       injectModels(); break;
      case 'requestAllSkills':    injectSkills(); break;
      case 'requestBrowse':       injectBrowse(); break;
      case 'previewSkills':       injectMatchedSkills(msg.requirement || ''); break;
      case 'requestTokenEstimate': injectTokenEstimate(); break;
    }
  }, 80);
}

function dispatchToWebview(data) {
  window.dispatchEvent(new MessageEvent('message', { data: data }));
}

function injectModels() {
  dispatchToWebview({ type: 'models', models: FIXTURE_MODELS });
  log('ok', '✓ 注入 ' + FIXTURE_MODELS.length + ' 个模型');
}

function injectSkills() {
  dispatchToWebview({ type: 'allSkills', skills: FIXTURE_SKILLS });
}

function injectBrowse() {
  dispatchToWebview({
    type: 'browseData',
    skills: FIXTURE_SKILLS.map(function(s) { return { name: s, hasFile: true, keywords: [s] }; }),
    templates: [{ name: 'Battle Feature', description: '战斗功能开发模板' }]
  });
}

function injectMatchedSkills(req) {
  var matched = [];
  if (/battle|战斗|奖励/i.test(req)) { matched.push('battle', 'SKILL'); }
  if (/ui|窗口/i.test(req)) { matched.push('ui', 'SKILL'); }
  if (/event|事件/i.test(req)) { matched.push('events', 'SKILL'); }
  dispatchToWebview({ type: 'matchedSkills', skills: matched });
}

function injectTokenEstimate() {
  dispatchToWebview({ type: 'tokenEstimate', estimate: '~4.2K tokens', imageCount: 0 });
}

var logEl;
function log(type, text) {
  if (!logEl) { logEl = document.getElementById('test-log'); }
  if (!logEl) { console.log('[' + type + '] ' + text); return; }
  var d = document.createElement('div');
  d.className = 'log-' + type;
  d.textContent = text;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}
</script>

<script>
(function() {
  var req = new XMLHttpRequest();
  req.open('GET', '../webview/index.html', true);
  req.onload = function() {
    // 抽取 <body> 内容（因为模板变量无法处理，我们直接嵌入），剥离 script/link 标签
    var html = req.responseText;
    // index.html 使用模板变量 {{cspSource}} 等，沙箱里只需要结构
    // 从中抽取 .container 部分
    var m = html.match(/<div class="container">([\s\S]*?)<\/div>\s*<script/);
    if (m) {
      document.getElementById('sandbox-app').innerHTML = '<div class="container">' + m[1] + '</div>';
    } else {
      // 备用：整个 body 注入
      document.getElementById('sandbox-app').innerHTML = '<div class="container">' +
        html.replace(/<head[\s\S]*?<\/head>/i, '').replace(/<\/?html[^>]*>/gi, '').replace(/<\/?body[^>]*>/gi, '') +
        '</div>';
    }
    log('info', '✓ index.html DOM 注入完成');
    loadMainJs();
  };
  req.onerror = function() {
    // file:// 协议下 XHR 被阻止，尝试直接 iframe 方式
    log('warn', 'XHR 被阻止（file:// 限制），切换到内联模式');
    loadFallbackDOM();
  };
  req.send();
})();

  var el = document.getElementById('req');
  if (el) {
    el.value = '给战斗系统新增倒计时奖励机制，关卡结束前完成给额外分数';
    el.dispatchEvent(new Event('input'));
    log('ok', '✓ 需求文本已填写');
  } else { log('err', '✗ 找不到 #req'); }
}

var _analysisModelIds = ['gpt-4o', 'gpt-4.1', 'gpt-4.1-mini', 'claude-sonnet-4', 'claude-sonnet-4-b'];
var _analysisIdx = 0;

function testStartAnalysis() {
  dispatchToWebview({ type: 'modelAnalysisStart' });
  log('ok', '✓ 分析启动（Step 2 激活）');
  _analysisIdx = 0;
  var perspectives = ['需求拆解', '技术评估', '风险与信息缺口', '执行顺序', 'Skill 覆盖'];
  perspectives.forEach(function(label, i) {
    setTimeout(function() {
      var mid = 'model-' + i;
      dispatchToWebview({ type: 'modelStart', modelId: mid, modelName: label });
      log('info', '▶ 开始: ' + label);
    }, 200 * (i + 1));
  });
}

function testCompleteOneByOne() {
  var perspectives = [
    { id: 'model-0', key: 'requirements' },
    { id: 'model-1', key: 'technical' },
    { id: 'model-2', key: 'risks' },
  ];
  perspectives.forEach(function(p, i) {
    setTimeout(function() {
      dispatchToWebview({
        type: 'modelDone',
        modelId: p.id,
        analysis: FIXTURE_ANALYSIS_RESULTS[p.key] || '（分析完成）'
      });
      log('ok', '✓ 视角完成: ' + p.id);
    }, 400 * (i + 1));
  });
}

function testAllDone() {
  var roles = ['requirements', 'technical', 'risks', 'execution_sequence', 'skill_coverage'];
  var count = 0;
  for (var i = 0; i < 5; i++) {
    (function(idx) {
      setTimeout(function() {
        dispatchToWebview({
          type: 'modelDone',
          modelId: 'model-' + idx,
          analysis: FIXTURE_ANALYSIS_RESULTS[roles[idx]] || '（完成）'
        });
        count++;
        if (count >= 5) {
          setTimeout(function() {
            dispatchToWebview({ type: 'analysisComplete' });
            log('ok', '✓ 全部完成，触发倒计时');
          }, 200);
        }
      }, 150 * (idx + 1));
    })(i);
  }
}

function testCancelAutoPlan() {
  var btn = document.querySelector('[data-action="cancelAutoPlan"]');
  if (btn) { btn.click(); log('ok', '✓ 取消自动计划'); }
  else { log('err', '✗ 找不到 cancelAutoPlan 按钮'); }
}

function testShowPlan() {
  dispatchToWebview({ type: 'planGenerated', merged: FIXTURE_PLAN, images: [] });
  log('ok', '✓ 计划注入（Markdown 格式）');
}

function testMarkdownVariants() {
  var mdTest = `## 标题测试 H2

### 小标题 H3

最后一行纯文本测试完毕。`;

/* ════════════════════════════════════════════
   AUTOMATED TEST SUITE
   ════════════════════════════════════════════ */
var testResults = { pass: 0, fail: 0, errors: [] };

function assert(condition, label) {
  if (condition) {
    testResults.pass++;
    log('ok', '  ✓ ' + label);
  } else {
    testResults.fail++;
    testResults.errors.push(label);
    log('err', '  ✗ FAIL: ' + label);
  }
}

function runAutoTests() {
  testResults = { pass: 0, fail: 0, errors: [] };
  log('info', '═════════════════════');
  log('info', '自动测试开始');
  log('info', '═════════════════════');

  // T1: DOM 基础结构
  log('info', '[T1] DOM 结构检查');
  assert(!!document.getElementById('step-1'), 'step-1 存在');
  assert(!!document.getElementById('step-2'), 'step-2 存在');
  assert(!!document.getElementById('step-3'), 'step-3 存在');
  assert(!!document.getElementById('step-4'), 'step-4 存在');
  assert(!!document.getElementById('toPlanBtn'), 'toPlanBtn 存在');
  assert(!!document.getElementById('autoPlanBar'), 'autoPlanBar 存在');
  assert(!!document.getElementById('planBody'), 'planBody 存在');
  assert(!!document.getElementById('req'), 'req textarea 存在');

  // T2: 初始状态
  log('info', '[T2] 初始状态');
  assert(document.getElementById('step-1').classList.contains('active'), 'Step 1 默认激活');
  assert(document.getElementById('toPlanBtn').disabled, 'toPlanBtn 初始禁用');
  assert(document.getElementById('autoPlanBar').classList.contains('hidden'), 'autoPlanBar 初始隐藏');

  // T3: renderMarkdown 函数存在性
  log('info', '[T3] renderMarkdown 函数');
  var hasMd = typeof window.renderMarkdown === 'function' || typeof renderMarkdown !== 'undefined';
  // main.js 中 renderMarkdown 是局部函数，无法直接访问 window.renderMarkdown
  // 但可通过注入计划来间接验证
  assert(!!document.getElementById('planBody'), 'planBody 容器存在（MD渲染目标）');

  // T4: 模型注入 + 0x 自动选
  log('info', '[T4] 模型注入与0x自动选');
  injectModels();
  setTimeout(function() {
    var rows = document.querySelectorAll('#modelBody tr');
    assert(rows.length >= FIXTURE_MODELS.length, '模型行数正确（' + rows.length + '行）');

    // 检查 0x 模型是否被自动勾选
    var freeModelIds = FIXTURE_MODELS.filter(function(m) { return m.multiplier === 0; }).map(function(m) { return m.id; });
    var allChecked = freeModelIds.every(function(id) {
      var cb = document.querySelector('input.model-check[value="' + id + '"]');
      return cb && cb.checked;
    });
    assert(allChecked, '所有 0x 模型自动勾选');

    // T5: 分析流程
    log('info', '[T5] 分析流程模拟');
    testSetRequirement();
    testStartAnalysis();
    setTimeout(function() {
      var tabs = document.querySelectorAll('.model-tab');
      assert(tabs.length > 0, '模型标签页已创建');

      testAllDone();
      setTimeout(function() {
        // 倒计时条应该显示
        assert(!document.getElementById('autoPlanBar').classList.contains('hidden'), '全部完成后倒计时条显示');

        // T6: 手动取消倒计时，跳转到 Step 3 并注入计划
        testCancelAutoPlan();
        assert(document.getElementById('autoPlanBar').classList.contains('hidden'), '取消后倒计时条隐藏');

        // T7: Markdown 渲染
        log('info', '[T7] Markdown 渲染');
        testShowPlan();
        setTimeout(function() {
          var pb = document.getElementById('planBody');
          assert(pb && pb.childElementCount > 0, 'planBody 渲染了 HTML 子元素');
          assert(pb && pb.querySelector('h2'), 'planBody 包含 H2 标题');
          assert(pb && pb.querySelector('ol, ul'), 'planBody 包含列表');

          // 最终报告
          log('info', '═════════════════════');
          var summary = '测试完成: ' + testResults.pass + ' 通过';
          if (testResults.fail > 0) {
            log('err', summary + ', ' + testResults.fail + ' 失败');
            log('err', '失败项: ' + testResults.errors.join(', '));
          } else {
            log('ok', '✅ ' + summary + ', 0 失败');
          }

          var r = document.getElementById('test-results');
          if (r) {
            r.innerHTML = '<span style="color:' + (testResults.fail > 0 ? '#f48771' : '#4ec9b0') + ';">' +
              (testResults.fail > 0 ? '❌' : '✅') + ' ' +
              testResults.pass + '/' + (testResults.pass + testResults.fail) + ' 通过</span>';
          }
        }, 600);
      }, 1200);
    }, 600);
  }, 200);
}

/* ════════════════════════════════════════════
   FULL DEMO FLOW (E2E)
   ════════════════════════════════════════════ */
function runFullFlow() {
  log('info', '🎬 完整演示流程开始');
  var steps = [
    [100,  function() { injectModels(); }],
    [600,  function() { testSetRequirement(); }],
    [900,  function() { testStartAnalysis(); }],
    [1500, function() { testAllDone(); }],
    [3500, function() {
      // 此时倒计时应已触发自动生成，或者点击手动
      var btn = document.getElementById('toPlanBtn');
      if (btn && !btn.disabled) {
        log('info', '手动点击：生成计划');
        // 模拟 planGenerated 返回
        setTimeout(function() {
          dispatchToWebview({ type: 'planGenerated', merged: FIXTURE_PLAN, images: [] });
          log('ok', '✓ 完整流程完成，请查看 Step 3 计划页');
        }, 300);
      }
    }],
  ];
  steps.forEach(function(s) { setTimeout(s[1], s[0]); });
}

function clearLog() {
  if (logEl) { logEl.innerHTML = ''; }
  else { var l = document.getElementById('test-log'); if (l) { l.innerHTML = ''; } }
}
